    <text x="36" y="48" text-anchor="middle" font-family="Orbitron, Audiowide, system-ui, sans-serif" font-size="22" font-weight="800" fill="url(#ttcGrad)" letter-spacing="-0.06em">TTC</text>
  </g>
  <!-- Wordmark -->
  <text x="92" y="34" font-family="Audiowide, Orbitron, system-ui, sans-serif" font-size="17" fill="#ecfdf5" letter-spacing="0.06em">TurboTech</text>
  <text x="92" y="58" font-family="Rajdhani, Exo 2, system-ui, sans-serif" font-size="15" font-weight="600" fill="#94a3b8" letter-spacing="0.14em">CONSULTING</text>
